name: atc-demo

include:
  - path: ./docker-compose.infrastructure.yml

services:
  atc-dc1:
    image: ghcr.io/atcprojectio/atc:latest
    container_name: atc-dc1
    command: server --config /etc/atc/atc-config.yaml
    ports:
      - "8088:8088"
      - "8089:8089"
    volumes:
      - ./atc-config.yaml:/etc/atc/atc-config.yaml
    environment:
      - OTEL_SDK_DISABLED=true
      - ATC_CONSUL_ADDR=http://consul-dc1:8500
      - ATC_CONSUL_DC=dc1
    depends_on:
      - consul-dc1
    networks:
      - demo-net

  atc-dc2:
    image: ghcr.io/atcprojectio/atc:latest
    container_name: atc-dc2
    command: server --config /etc/atc/atc-config.yaml
    ports:
      - "8090:8088"
      - "8091:8089"
    volumes:
      - ./atc-config.yaml:/etc/atc/atc-config.yaml
    environment:
      - OTEL_SDK_DISABLED=true
      - ATC_CONSUL_ADDR=http://consul-dc2:8501
      - ATC_CONSUL_DC=dc2
    depends_on:
      - consul-dc2
    networks:
      - demo-net

networks:
  demo-net:
    driver: bridge
